<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- DNS prefetch for faster font connection -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://fonts.gstatic.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Non-render-blocking font load (swap + media trick) - reduced to 3 fonts, fewer weights -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Outfit:wght@400;600;700;900&family=Inter:wght@400;500;600&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Outfit:wght@400;600;700;900&family=Inter:wght@400;500;600&display=swap"></noscript>

    <!-- Preload LCP image — browser fetches immediately before React even boots -->
    <link rel="preload" href="/profile.webp" as="image" type="image/webp" fetchpriority="high">

    <!-- Critical inline CSS: paints background instantly, no blank screen during JS load -->
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { scroll-behavior: smooth; -webkit-tap-highlight-color: transparent; }
      body {
        font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #f9fafb;
        color: #111827;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        min-height: 100vh;
        overflow-x: hidden;
      }
      #root { min-height: 100vh; }
      #root > main {
        background: linear-gradient(135deg, #ffffff 0%, #fffbeb 50%, #f9fafb 100%);
        min-height: 100vh;
      }
      img {
        max-width: 100%;
        height: auto;
        -webkit-user-drag: none;
        -khtml-user-drag: none;
        -moz-user-drag: none;
        -o-user-drag: none;
        user-drag: none;
        user-select: none;
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
      }
    </style>

    <meta name="description" content="Immersive 3D portfolio showcasing cutting-edge web development projects and creative solutions" />
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://irfanshaikhportfolio.netlify.app/" />

    <!-- Google Site Verification (Placeholder: uncomment and replace with your token) -->
    <!-- <meta name="google-site-verification" content="YOUR_GOOGLE_VERIFICATION_TOKEN" /> -->

    <!-- Open Graph / Facebook -->
    <meta property="og:title" content="Irfan Shaikh - Creative Developer Portfolio" />
    <meta property="og:description" content="Immersive 3D portfolio showcasing cutting-edge web development projects and creative solutions" />
    <meta property="og:image" content="https://irfanshaikhportfolio.netlify.app/og.png" type="image/png" />
    <meta property="og:url" content="https://irfanshaikhportfolio.netlify.app/" />
    <meta property="og:type" content="website" />
    <meta property="og:author" content="Irfan Shaikh" />
    <meta property="og:site_name" content="irfan'sFolio" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:site" content="@irfan_shekh" />
    <meta property="twitter:title" content="Irfan Shaikh - Creative Developer Portfolio" />
    <meta property="twitter:description" content="Immersive 3D portfolio showcasing cutting-edge web development projects and creative solutions" />
    <meta property="twitter:image" content="https://irfanshaikhportfolio.netlify.app/og.png" type="image/png" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "ProfilePage",
          "@id": "https://irfanshaikhportfolio.netlify.app/#profilepage",
          "url": "https://irfanshaikhportfolio.netlify.app/",
          "name": "Irfan Shaikh - Creative Developer Portfolio",
          "description": "Immersive 3D portfolio showcasing cutting-edge web development projects and creative solutions by Irfan Shaikh.",
          "mainEntity": {
            "@type": "Person",
            "@id": "https://irfanshaikhportfolio.netlify.app/#person",
            "name": "Irfan Shaikh",
            "jobTitle": "Full-Stack Developer & AI Specialist",
            "url": "https://irfanshaikhportfolio.netlify.app/",
            "image": "https://irfanshaikhportfolio.netlify.app/profile.png",
            "description": "Full-Stack Developer and AI Specialist experienced in building production-ready web applications, legal intelligence software, and custom AI tools.",
            "knowsAbout": [
              "Web Development",
              "AI & Machine Learning",
              "Full-Stack Engineering",
              "Next.js",
              "React",
              "Python",
              "FastAPI",
              "TensorFlow",
              "Supabase"
            ],
            "alumniOf": {
              "@type": "EducationalOrganization",
              "name": "Smt Kumudben Debar College"
            },
            "sameAs": [
              "https://github.com/irfanshaikh110805-glitch"
            ]
          }
        },
        {
          "@type": "WebSite",
          "@id": "https://irfanshaikhportfolio.netlify.app/#website",
          "url": "https://irfanshaikhportfolio.netlify.app/",
          "name": "DevFolio - Irfan Shaikh Portfolio",
          "description": "Immersive 3D portfolio showcasing cutting-edge web development projects and creative solutions.",
          "publisher": {
            "@id": "https://irfanshaikhportfolio.netlify.app/#person"
          }
        }
      ]
    }
    </script>

    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" type="image/png" />
    <title>Irfan Shaikh | Creative Full-Stack Developer Portfolio</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Disable right-click globally
      document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
      });

      // Disable drag and drop for all images/assets
      document.addEventListener('dragstart', function(e) {
        if (e.target.tagName === 'IMG' || e.target.tagName === 'svg') {
          e.preventDefault();
        }
      });

      // Disable developer tools and save keyboard shortcuts
      document.addEventListener('keydown', function(e) {
        // Prevent Ctrl+S (Save)
        if ((e.ctrlKey || e.metaKey) && e.key === 's') {
          e.preventDefault();
        }
        // Prevent F12 (DevTools)
        if (e.key === 'F12') {
          e.preventDefault();
        }
        // Prevent Ctrl+Shift+I (DevTools)
        if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'I' || e.key === 'i')) {
          e.preventDefault();
        }
        // Prevent Ctrl+Shift+J (DevTools Console)
        if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'J' || e.key === 'j')) {
          e.preventDefault();
        }
        // Prevent Ctrl+Shift+C (Inspect Element)
        if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'C' || e.key === 'c')) {
          e.preventDefault();
        }
        // Prevent Ctrl+U (View Source)
        if ((e.ctrlKey || e.metaKey) && (e.key === 'U' || e.key === 'u')) {
          e.preventDefault();
        }
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
