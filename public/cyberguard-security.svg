<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#991b1b;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect fill="url(#bg)" width="400" height="300"/>
  <g fill="white" opacity="0.9">
    <!-- Shield icon -->
    <path d="M200 80 L160 100 L160 160 C160 180 180 200 200 220 C220 200 240 180 240 160 L240 100 Z" fill="none" stroke="white" stroke-width="3"/>
    <!-- Checkmark -->
    <path d="M180 150 L195 165 L220 130" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Data lines -->
    <g opacity="0.6">
      <rect x="120" y="240" width="40" height="4" fill="white" rx="2"/>
      <rect x="170" y="240" width="60" height="4" fill="white" rx="2"/>
      <rect x="240" y="240" width="40" height="4" fill="white" rx="2"/>
      <rect x="120" y="250" width="30" height="4" fill="white" rx="2"/>
      <rect x="160" y="250" width="50" height="4" fill="white" rx="2"/>
      <rect x="220" y="250" width="60" height="4" fill="white" rx="2"/>
    </g>
  </g>
  <text fill="white" font-family="Arial, sans-serif" font-size="18" font-weight="bold" x="200" y="45" text-anchor="middle">CyberGuard AI</text>
  <text fill="white" font-family="Arial, sans-serif" font-size="14" x="200" y="280" text-anchor="middle" opacity="0.8">Security Platform</text>
</svg>